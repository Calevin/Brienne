version: '3.8'

services:
  # Base de datos MongoDB para el Backend
  mongo:
    image: mongo:7.0
    container_name: brienne_mongo
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: password123
    ulimits:
      nofile:
        soft: 65536
        hard: 65536

volumes:
  mongo_data:
